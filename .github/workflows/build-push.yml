# Build the OCI image for hecate-rag and push to ghcr.io.
# Triggered on push to main and on tag pushes.
#
# Drop this into .github/workflows/build-push.yml (the GitHub mirror
# runs this; Codeberg has Forgejo Actions disabled per the migration
# pattern).

name: build-and-push

on:
  push:
    branches: [main]
    tags:     ['v*']

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Containerfile
          push: true
          tags: |
            ghcr.io/hecate-services/hecate-rag:latest
            ghcr.io/hecate-services/hecate-rag:${{ steps.tag.outputs.tag }}
